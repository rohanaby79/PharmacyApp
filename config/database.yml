default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: localhost
  port: 5432
  username: <%= ENV.fetch("DB_USERNAME") { `whoami`.strip } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "" } %>

development:
  <<: *default
  database: pharmacy_app_development

test:
  <<: *default
  database: pharmacy_app_test

production:
  <<: *default
  database: pharmacy_app_production
  username: pharmacy_app
  password: <%= ENV["PHARMACY_APP_DATABASE_PASSWORD"] %>