<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pharmacy App - Doctor Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 400px;
    }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 { color: #2c5f8a; font-size: 24px; }
    .logo p { color: #888; font-size: 14px; margin-top: 5px; }
    label { display: block; margin-bottom: 5px; color: #555; font-size: 14px; font-weight: bold; }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    input:focus { outline: none; border-color: #2c5f8a; }
    button {
      width: 100%;
      padding: 12px;
      background: #2c5f8a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #1e4a6e; }
    .error {
      background: #ffe0e0;
      color: #c0392b;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 14px;
      display: none;
    }
    .hint {
      text-align: center;
      color: #aaa;
      font-size: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <h1>🏥 PharmacyApp</h1>
      <p>Doctor Portal — Secure Login</p>
    </div>
    <div class="error" id="error-msg">Invalid email or password. Please try again.</div>
    <label>Email</label>
    <input type="email" id="email" placeholder="doctor@hospital.com"/>
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••"/>
    <button onclick="login()">Login</button>
    <p class="hint">Test account: test@hospital.com / password123</p>
  </div>

  <script>
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (data.token) {
        localStorage.setItem('auth_token', data.token);
        localStorage.setItem('doctor_name', data.doctor_name);
        window.location.href = '/dashboard.html';
      } else {
        document.getElementById('error-msg').style.display = 'block';
      }
    }

    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
